name: Apply database migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type APPLY (or true) to allow migration apply'
        required: true
        type: choice
        options:
          - APPLY
          - true
      environment:
        description: 'Target environment label for audit logs'
        required: false
        default: production
        type: choice
        options:
          - production
          - preview
          - staging
      run_apply:
        description: 'Run db:apply (false = status-only mode)'
        required: false
        default: true
        type: boolean

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Validate required secrets presence
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "[ERROR] Missing required GitHub Actions secret: DATABASE_URL."
            echo "Add it in: Repository -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "[OK] Required DATABASE_URL secret is present."

      - name: Validate database environment
        run: npm run db:validate

      - name: Pre-migration status
        run: node scripts/db-status.mjs --allow-status-failure

      - name: Confirmation gate for migration apply
        id: confirm_gate
        run: |
          RUN_APPLY="${{ github.event.inputs.run_apply }}"
          CONFIRM_INPUT="${{ github.event.inputs.confirm }}"

          if [ "$RUN_APPLY" != "true" ]; then
            echo "run_apply=false -> status-only mode. Skipping db:apply."
            echo "apply_allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$CONFIRM_INPUT" = "APPLY" ] || [ "$CONFIRM_INPUT" = "true" ]; then
            echo "[OK] Confirmation accepted; db:apply is authorized."
            echo "apply_allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "[ERROR] Confirmation invalid. Re-run workflow with confirm=APPLY (or true)."
          exit 1

      - name: Apply migrations
        if: steps.confirm_gate.outputs.apply_allowed == 'true'
        env:
          CONFIRM_DB_APPLY: 'true'
        run: npm run db:apply

      - name: Post-migration status
        run: npm run db:status

      - name: Generate Prisma Client
        if: steps.confirm_gate.outputs.apply_allowed == 'false'
        run: npm run db:generate
